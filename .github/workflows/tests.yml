name: tester
on:
  pull_request:
    branches:
      - "master"
    types:
      - opened
      - edited
      - reopened
      - synchronize
      - ready_for_review
jobs:
  pr-title-validator:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title format
        shell: bash
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Strict rule: contestant/<name>
          # Example: contestant/alice-01
          if [[ ! "$PR_TITLE" =~ ^contestant\/[a-z0-9._-]+$ ]]; then
            echo "Invalid PR title: '$PR_TITLE'"
            echo "Required format: contestant/<name>"
            exit 1
          fi

  test-validator:
    needs: pr-title-validator
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./tests
    steps:
      - name: Checkout to working directory
        uses: actions/checkout@v5
      - name: Run Easy tests
        run: python3 easy/test_lambda_function1.py
      - name: Run Medium tests
        run: python3 medium/test_lambda_function2.py
      - name: Run Hard tests
        run: python3 hard/test_lambda_function3.py
